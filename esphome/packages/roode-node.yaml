substitutions:
  node_key: primary
  node_label: Primary
  node_address: "0x2A"
  node_xshut_pin: GPIO16
  node_sda_pin: "21"
  node_scl_pin: "22"
  node_sampling: "2"
  node_orientation: parallel
  node_invert: "true"
  node_roi_height: "16"
  node_roi_width: "6"
  node_max_threshold: "85%"
  node_mask_distance: "150mm"
  node_mask_duration: "2s"
  node_auto_recalibration: "off"
  node_weight_base: "10"

vl53l1x:
  - id: vl53l1x_${node_key}
    address: ${node_address}
    sda_pin: ${node_sda_pin}
    scl_pin: ${node_scl_pin}
    frequency: 400kHz
    pins:
      xshut: ${node_xshut_pin}
    calibration:
      ranging: auto

roode:
  - id: roode_${node_key}
    sensor: vl53l1x_${node_key}
    sampling: ${node_sampling}
    orientation: ${node_orientation}
    roi:
      height: ${node_roi_height}
      width: ${node_roi_width}
    detection_thresholds:
      max: ${node_max_threshold}
    auto_recalibration_interval: ${node_auto_recalibration}
    masking_detection:
      distance: ${node_mask_distance}
      duration: ${node_mask_duration}
    zones:
      invert: ${node_invert}

button:
  - platform: template
    name: ${friendly_name} ${node_label} Recalibrate
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: ${node_weight_base}
    on_press:
      - lambda: id(roode_${node_key})->recalibration();
  - platform: template
    name: ${friendly_name} ${node_label} Reset Counter
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: ${node_weight_base}
    on_press:
      - lambda: |-
          auto call = id(people_counter_${node_key}).make_call();
          call.set_value(0);
          call.perform();

number:
  - platform: roode
    roode_id: roode_${node_key}
    people_counter:
      id: people_counter_${node_key}
      name: ${friendly_name} ${node_label} People Counter
      min_value: 0
      max_value: 50
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
  - platform: template
    id: auto_recalibration_setting_${node_key}
    name: ${friendly_name} ${node_label} Auto Recalibration (min)
    entity_category: config
    mode: box
    min_value: 0
    max_value: 720
    step: 5
    update_interval: 15s
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_auto_recalibration_interval_minutes();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_auto_recalibration_interval_minutes((uint16_t) x);
  - platform: template
    id: sampling_setting_${node_key}
    name: ${friendly_name} ${node_label} Sampling
    entity_category: config
    mode: box
    min_value: 1
    max_value: 8
    step: 1
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_tuning
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_sampling_size();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_sampling_size((uint8_t) x);
  - platform: template
    id: min_threshold_setting_${node_key}
    name: ${friendly_name} ${node_label} Min Threshold %
    entity_category: config
    mode: box
    min_value: 0
    max_value: 40
    step: 1
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_tuning
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_min_threshold_percentage();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_min_threshold_percentage((uint8_t) x);
          id(roode_${node_key})->recalibration();
  - platform: template
    id: max_threshold_setting_${node_key}
    name: ${friendly_name} ${node_label} Max Threshold %
    entity_category: config
    mode: box
    min_value: 40
    max_value: 95
    step: 1
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_tuning
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_max_threshold_percentage();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_max_threshold_percentage((uint8_t) x);
          id(roode_${node_key})->recalibration();
  - platform: template
    id: roi_width_setting_${node_key}
    name: ${friendly_name} ${node_label} ROI Width
    entity_category: config
    mode: box
    min_value: 4
    max_value: 16
    step: 1
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_tuning
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_roi_width();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_roi_width((uint8_t) x);
          id(roode_${node_key})->recalibration();
  - platform: template
    id: roi_height_setting_${node_key}
    name: ${friendly_name} ${node_label} ROI Height
    entity_category: config
    mode: box
    min_value: 4
    max_value: 16
    step: 1
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_tuning
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_roi_height();
    set_action:
      - lambda: |-
          id(roode_${node_key})->set_roi_height((uint8_t) x);
          id(roode_${node_key})->recalibration();

binary_sensor:
  - platform: roode
    roode_id: roode_${node_key}
    presence_sensor:
      id: presence_${node_key}
      name: ${friendly_name} ${node_label} Presence
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}
    masking_detected:
      id: masking_${node_key}
      name: ${friendly_name} ${node_label} Potential Masking Detected
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}

sensor:
  - platform: template
    id: calibration_age_${node_key}
    name: ${friendly_name} ${node_label} Minutes Since Calibration
    entity_category: diagnostic
    unit_of_measurement: min
    accuracy_decimals: 0
    update_interval: 30s
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      return (float) id(roode_${node_key})->get_minutes_since_last_recalibration();
  - platform: template
    id: recalibration_due_${node_key}
    name: ${friendly_name} ${node_label} Minutes Until Auto Recalibration
    entity_category: diagnostic
    unit_of_measurement: min
    accuracy_decimals: 0
    update_interval: 30s
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      if (id(roode_${node_key})->get_auto_recalibration_interval_minutes() == 0) {
        return NAN;
      }
      return (float) id(roode_${node_key})->get_minutes_until_next_recalibration();
  - platform: roode
    id: roode_sensors_${node_key}
    roode_id: roode_${node_key}
    distance_entry:
      id: distance_entry_${node_key}
      name: ${friendly_name} ${node_label} Distance Zone 0
      filters:
        - delta: 100
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}
    distance_exit:
      id: distance_exit_${node_key}
      name: ${friendly_name} ${node_label} Distance Zone 1
      filters:
        - delta: 100
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}
    max_threshold_entry:
      id: max_threshold_entry_${node_key}
      name: ${friendly_name} ${node_label} Max Zone 0
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    max_threshold_exit:
      id: max_threshold_exit_${node_key}
      name: ${friendly_name} ${node_label} Max Zone 1
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    min_threshold_entry:
      id: min_threshold_entry_${node_key}
      name: ${friendly_name} ${node_label} Min Zone 0
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    min_threshold_exit:
      id: min_threshold_exit_${node_key}
      name: ${friendly_name} ${node_label} Min Zone 1
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    roi_height_entry:
      id: roi_height_entry_${node_key}
      name: ${friendly_name} ${node_label} ROI Height Zone 0
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    roi_width_entry:
      id: roi_width_entry_${node_key}
      name: ${friendly_name} ${node_label} ROI Width Zone 0
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    roi_height_exit:
      id: roi_height_exit_${node_key}
      name: ${friendly_name} ${node_label} ROI Height Zone 1
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    roi_width_exit:
      id: roi_width_exit_${node_key}
      name: ${friendly_name} ${node_label} ROI Width Zone 1
      web_server:
        sorting_group_id: web_group_tuning
        sorting_weight: ${node_weight_base}
    sensor_status:
      id: sensor_status_${node_key}
      name: ${friendly_name} ${node_label} Sensor Status
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}

text_sensor:
  - platform: template
    id: calibration_guide_${node_key}
    name: ${friendly_name} ${node_label} Calibration Guide
    entity_category: diagnostic
    update_interval: never
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      return {"Leave the doorway empty, check the live distances, then press Recalibrate."};
  - platform: template
    id: calibration_status_${node_key}
    name: ${friendly_name} ${node_label} Calibration Status
    entity_category: diagnostic
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      if (isnan(id(sensor_status_${node_key}).state)) {
        return {"Waiting for sensor"};
      }
      int status = (int) id(sensor_status_${node_key}).state;
      if (status != 0) {
        char buffer[24];
        snprintf(buffer, sizeof(buffer), "Sensor error %d", status);
        return {buffer};
      }
      if (id(masking_${node_key}).state) {
        return {"Blocked - move away from sensor"};
      }
      if (id(presence_${node_key}).state) {
        return {"Doorway occupied - wait"};
      }
      return {"Ready - clear and stable"};
  - platform: template
    id: node_health_${node_key}
    name: ${friendly_name} ${node_label} Health
    entity_category: diagnostic
    update_interval: 5s
    web_server:
      sorting_group_id: web_group_live
      sorting_weight: ${node_weight_base}
    lambda: |-
      if (isnan(id(sensor_status_${node_key}).state)) {
        return {"Waiting for sensor"};
      }
      int status = (int) id(sensor_status_${node_key}).state;
      if (status == 0) {
        return {"OK"};
      }
      char buffer[24];
      snprintf(buffer, sizeof(buffer), "Error %d", status);
      return {buffer};
  - platform: template
    id: node_snapshot_${node_key}
    name: ${friendly_name} ${node_label} Snapshot
    entity_category: diagnostic
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_calibration
      sorting_weight: ${node_weight_base}
    lambda: |-
      if (isnan(id(distance_entry_${node_key}).state) || isnan(id(distance_exit_${node_key}).state)) {
        return {"Waiting for distances"};
      }
      char buffer[128];
      snprintf(
        buffer,
        sizeof(buffer),
        "Entry %.0f mm | Exit %.0f mm | Max %.0f/%.0f | Masking %s",
        id(distance_entry_${node_key}).state,
        id(distance_exit_${node_key}).state,
        id(max_threshold_entry_${node_key}).state,
        id(max_threshold_exit_${node_key}).state,
        id(masking_${node_key}).state ? "yes" : "no"
      );
      return {buffer};
  - platform: roode
    roode_id: roode_${node_key}
    version:
      id: version_${node_key}
      name: ${friendly_name} ${node_label} Version
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}
  - platform: roode
    roode_id: roode_${node_key}
    entry_exit_event:
      id: last_direction_${node_key}
      name: ${friendly_name} ${node_label} Last Direction
      web_server:
        sorting_group_id: web_group_live
        sorting_weight: ${node_weight_base}
