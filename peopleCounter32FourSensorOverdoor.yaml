substitutions:
  devicename: roode-four-sensor-overdoor
  friendly_name: Roode Four Sensor Overdoor
  required_votes: "3"
  vote_window_ms: "1800"
  vote_cooldown_ms: "700"
  u3_zone_invert: "false"
  u4_zone_invert: "false"
  u7_zone_invert: "false"
  u8_zone_invert: "false"

external_components:
  refresh: always
  source: components

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(aggregate_last_event).publish_state("Booting");
          id(aggregate_last_reason).publish_state("Waiting for Roode sensors");

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

api:
  reboot_timeout: 60min

ota:
  - platform: esphome
    password: !secret roode_ota_password

wifi:
  ssid: !secret roode_wifi_ssid
  password: !secret roode_wifi_password
  fast_connect: true
  use_address: 10.0.0.100
  manual_ip:
    static_ip: 10.0.0.100
    gateway: 10.0.0.1
    subnet: 255.255.255.0
  domain: .local
  power_save_mode: none
  ap:
    ssid: "Roode 4 Counter"
    password: !secret roode_fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: admin
    password: admin123

globals:
  - id: people_inside
    type: int
    restore_value: true
    initial_value: "0"
  - id: confirmed_in
    type: int
    restore_value: true
    initial_value: "0"
  - id: confirmed_out
    type: int
    restore_value: true
    initial_value: "0"
  - id: rejected_events
    type: int
    restore_value: true
    initial_value: "0"
  - id: vote_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: cooldown_until_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: in_vote_mask
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: out_vote_mask
    type: uint8_t
    restore_value: false
    initial_value: "0"
  - id: last_vote_summary
    type: std::string
    restore_value: false
    initial_value: '"No votes yet"'

script:
  - id: clear_vote_window
    mode: restart
    then:
      - lambda: |-
          id(vote_started_ms) = 0;
          id(in_vote_mask) = 0;
          id(out_vote_mask) = 0;
          id(last_vote_summary) = "No active votes";

  - id: publish_aggregate_state
    mode: restart
    then:
      - lambda: |-
          id(people_inside_sensor).publish_state(id(people_inside));
          id(confirmed_in_sensor).publish_state(id(confirmed_in));
          id(confirmed_out_sensor).publish_state(id(confirmed_out));
          id(rejected_events_sensor).publish_state(id(rejected_events));

          char buffer[96];
          snprintf(buffer, sizeof(buffer), "IN mask=0x%02X OUT mask=0x%02X | %s",
                   id(in_vote_mask), id(out_vote_mask), id(last_vote_summary).c_str());
          id(aggregate_vote_window).publish_state(std::string(buffer));

  - id: register_roode_vote
    mode: queued
    parameters:
      sensor_index: int
      sensor_label: string
      direction: string
    then:
      - lambda: |-
          const uint32_t now = millis();
          const uint8_t required = ${required_votes};
          const uint32_t vote_window_ms = ${vote_window_ms};
          const uint32_t cooldown_ms = ${vote_cooldown_ms};

          auto count_bits = [](uint8_t value) -> uint8_t {
            uint8_t count = 0;
            while (value != 0) {
              count += value & 0x01;
              value >>= 1;
            }
            return count;
          };

          auto publish_text = [](esphome::template_::TemplateTextSensor *sensor, const std::string &value) {
            sensor->publish_state(value);
          };

          if (now < id(cooldown_until_ms)) {
            id(last_vote_summary) = sensor_label + " ignored during cooldown";
            publish_text(id(aggregate_last_reason), id(last_vote_summary));
            id(publish_aggregate_state).execute();
            return;
          }

          if (id(vote_started_ms) == 0 || (now - id(vote_started_ms)) > vote_window_ms) {
            id(vote_started_ms) = now;
            id(in_vote_mask) = 0;
            id(out_vote_mask) = 0;
          }

          const uint8_t bit = static_cast<uint8_t>(1U << sensor_index);
          const bool is_in = direction == "Entry" || direction == "entry" || direction == "IN" || direction == "in";
          const bool is_out = direction == "Exit" || direction == "exit" || direction == "OUT" || direction == "out";

          if (!is_in && !is_out) {
            id(last_vote_summary) = sensor_label + " produced unknown Roode event: " + direction;
            publish_text(id(aggregate_last_reason), id(last_vote_summary));
            id(publish_aggregate_state).execute();
            return;
          }

          if (is_in) {
            id(in_vote_mask) |= bit;
            id(out_vote_mask) &= ~bit;
          } else {
            id(out_vote_mask) |= bit;
            id(in_vote_mask) &= ~bit;
          }

          const uint8_t in_votes = count_bits(id(in_vote_mask));
          const uint8_t out_votes = count_bits(id(out_vote_mask));

          char vote_buffer[96];
          snprintf(vote_buffer, sizeof(vote_buffer), "%s voted %s | IN=%u OUT=%u",
                   sensor_label.c_str(), is_in ? "IN" : "OUT", in_votes, out_votes);
          id(last_vote_summary) = vote_buffer;

          if (in_votes >= required && out_votes < required) {
            id(people_inside) += 1;
            id(confirmed_in) += 1;
            id(cooldown_until_ms) = now + cooldown_ms;
            publish_text(id(aggregate_last_event), "IN");
            publish_text(id(aggregate_last_reason), "Accepted: " + std::to_string(in_votes) +
                         " sensors agreed IN. Last vote: " + id(last_vote_summary));
            id(clear_vote_window).execute();
          } else if (out_votes >= required && in_votes < required) {
            if (id(people_inside) > 0) {
              id(people_inside) -= 1;
            }
            id(confirmed_out) += 1;
            id(cooldown_until_ms) = now + cooldown_ms;
            publish_text(id(aggregate_last_event), "OUT");
            publish_text(id(aggregate_last_reason), "Accepted: " + std::to_string(out_votes) +
                         " sensors agreed OUT. Last vote: " + id(last_vote_summary));
            id(clear_vote_window).execute();
          } else if (in_votes >= required && out_votes >= required) {
            id(rejected_events) += 1;
            id(cooldown_until_ms) = now + cooldown_ms;
            publish_text(id(aggregate_last_event), "REJECTED");
            publish_text(id(aggregate_last_reason), "Rejected: conflicting IN and OUT majorities");
            id(clear_vote_window).execute();
          } else {
            publish_text(id(aggregate_last_reason), "Waiting for " + std::to_string(required) +
                         " matching votes. " + id(last_vote_summary));
          }

          id(publish_aggregate_state).execute();

interval:
  - interval: 500ms
    then:
      - lambda: |-
          const uint32_t now = millis();
          if (id(vote_started_ms) != 0 && (now - id(vote_started_ms)) > ${vote_window_ms}) {
            id(rejected_events) += 1;
            id(vote_started_ms) = 0;
            id(in_vote_mask) = 0;
            id(out_vote_mask) = 0;
            id(last_vote_summary) = "Vote window expired without enough agreement";
            id(aggregate_last_event).publish_state("REJECTED");
            id(aggregate_last_reason).publish_state(id(last_vote_summary));
          }
      - script.execute: publish_aggregate_state

vl53l1x:
  - id: tof_u3
    address: 0x30
    sda_pin: 21
    scl_pin: 22
    frequency: 400kHz
    timeout: 2s
    pins:
      xshut: GPIO16
    calibration:
      ranging: auto

  - id: tof_u4
    address: 0x31
    sda_pin: 21
    scl_pin: 22
    frequency: 400kHz
    timeout: 2s
    pins:
      xshut: GPIO17
    calibration:
      ranging: auto

  - id: tof_u7
    address: 0x32
    sda_pin: 21
    scl_pin: 22
    frequency: 400kHz
    timeout: 2s
    pins:
      xshut: GPIO23
    calibration:
      ranging: auto

  - id: tof_u8
    address: 0x33
    sda_pin: 21
    scl_pin: 22
    frequency: 400kHz
    timeout: 2s
    pins:
      xshut: GPIO25
    calibration:
      ranging: auto

roode:
  - id: roode_u3
    sensor: tof_u3
    sampling: 2
    roi: { height: 16, width: 6 }
    detection_thresholds:
      max: 85%
    zones:
      invert: ${u3_zone_invert}

  - id: roode_u4
    sensor: tof_u4
    sampling: 2
    roi: { height: 16, width: 6 }
    detection_thresholds:
      max: 85%
    zones:
      invert: ${u4_zone_invert}

  - id: roode_u7
    sensor: tof_u7
    sampling: 2
    roi: { height: 16, width: 6 }
    detection_thresholds:
      max: 85%
    zones:
      invert: ${u7_zone_invert}

  - id: roode_u8
    sensor: tof_u8
    sampling: 2
    roi: { height: 16, width: 6 }
    detection_thresholds:
      max: 85%
    zones:
      invert: ${u8_zone_invert}

button:
  - platform: restart
    name: ${friendly_name} Restart
    entity_category: config

  - platform: template
    name: ${friendly_name} Recalibrate All Roode Sensors
    entity_category: config
    on_press:
      - lambda: |-
          id(roode_u3)->recalibration();
          id(roode_u4)->recalibration();
          id(roode_u7)->recalibration();
          id(roode_u8)->recalibration();
          id(aggregate_last_reason).publish_state("Manual recalibration requested for all sensors");

  - platform: template
    name: ${friendly_name} Reset Counts
    entity_category: config
    on_press:
      - lambda: |-
          id(people_inside) = 0;
          id(confirmed_in) = 0;
          id(confirmed_out) = 0;
          id(rejected_events) = 0;
          id(aggregate_last_event).publish_state("RESET");
          id(aggregate_last_reason).publish_state("All aggregate counters reset");
      - script.execute: clear_vote_window
      - script.execute: publish_aggregate_state

number:
  - platform: template
    id: people_inside_number
    name: ${friendly_name} People Inside
    min_value: 0
    max_value: 500
    step: 1
    mode: box
    update_interval: 1s
    lambda: |-
      return id(people_inside);
    set_action:
      - lambda: |-
          id(people_inside) = static_cast<int>(x);
      - script.execute: publish_aggregate_state

binary_sensor:
  - platform: status
    name: ${friendly_name} API Status

  - platform: roode
    roode_id: roode_u3
    presence_sensor:
      name: ${friendly_name} U3 Presence

  - platform: roode
    roode_id: roode_u4
    presence_sensor:
      name: ${friendly_name} U4 Presence

  - platform: roode
    roode_id: roode_u7
    presence_sensor:
      name: ${friendly_name} U7 Presence

  - platform: roode
    roode_id: roode_u8
    presence_sensor:
      name: ${friendly_name} U8 Presence

sensor:
  - platform: template
    id: people_inside_sensor
    name: ${friendly_name} People Inside Sensor
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    id: confirmed_in_sensor
    name: ${friendly_name} Confirmed IN
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    id: confirmed_out_sensor
    name: ${friendly_name} Confirmed OUT
    accuracy_decimals: 0
    update_interval: never

  - platform: template
    id: rejected_events_sensor
    name: ${friendly_name} Rejected Events
    accuracy_decimals: 0
    update_interval: never

  - platform: wifi_signal
    name: ${friendly_name} RSSI
    update_interval: 60s

  - platform: roode
    id: roode_u3_distance_sensors
    roode_id: roode_u3
    distance_entry:
      name: ${friendly_name} U3 Entry Zone Distance
    distance_exit:
      name: ${friendly_name} U3 Exit Zone Distance

  - platform: roode
    id: roode_u4_distance_sensors
    roode_id: roode_u4
    distance_entry:
      name: ${friendly_name} U4 Entry Zone Distance
    distance_exit:
      name: ${friendly_name} U4 Exit Zone Distance

  - platform: roode
    id: roode_u7_distance_sensors
    roode_id: roode_u7
    distance_entry:
      name: ${friendly_name} U7 Entry Zone Distance
    distance_exit:
      name: ${friendly_name} U7 Exit Zone Distance

  - platform: roode
    id: roode_u8_distance_sensors
    roode_id: roode_u8
    distance_entry:
      name: ${friendly_name} U8 Entry Zone Distance
    distance_exit:
      name: ${friendly_name} U8 Exit Zone Distance

text_sensor:
  - platform: template
    id: aggregate_last_event
    name: ${friendly_name} Last Aggregate Event
    update_interval: never

  - platform: template
    id: aggregate_last_reason
    name: ${friendly_name} Last Aggregate Reason
    update_interval: never

  - platform: template
    id: aggregate_vote_window
    name: ${friendly_name} Vote Window
    update_interval: never

  - platform: roode
    roode_id: roode_u3
    entry_exit_event:
      name: ${friendly_name} U3 Roode Event
      on_value:
        then:
          - script.execute:
              id: register_roode_vote
              sensor_index: 0
              sensor_label: U3
              direction: !lambda "return x;"

  - platform: roode
    roode_id: roode_u4
    entry_exit_event:
      name: ${friendly_name} U4 Roode Event
      on_value:
        then:
          - script.execute:
              id: register_roode_vote
              sensor_index: 1
              sensor_label: U4
              direction: !lambda "return x;"

  - platform: roode
    roode_id: roode_u7
    entry_exit_event:
      name: ${friendly_name} U7 Roode Event
      on_value:
        then:
          - script.execute:
              id: register_roode_vote
              sensor_index: 2
              sensor_label: U7
              direction: !lambda "return x;"

  - platform: roode
    roode_id: roode_u8
    entry_exit_event:
      name: ${friendly_name} U8 Roode Event
      on_value:
        then:
          - script.execute:
              id: register_roode_vote
              sensor_index: 3
              sensor_label: U8
              direction: !lambda "return x;"
