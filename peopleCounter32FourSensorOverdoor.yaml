    ip_address:
      name: ${friendly_name} IP Address
      entity_category: diagnostic
      web_server:
        sorting_group_id: web_group_overview
        sorting_weight: 70
    ssid:
      name: ${friendly_name} WiFi SSID
      entity_category: diagnostic
      web_server:
        sorting_group_id: web_group_health
        sorting_weight: 80

  - platform: template
    name: ${friendly_name} System Status
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 45
    lambda: |-
      return {id(overdoor_counter).get_system_status_text()};

  - platform: template
    name: ${friendly_name} Detection Phase
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 50
    lambda: |-
      return {id(overdoor_counter).get_phase_text()};

  - platform: template
    name: ${friendly_name} Last Direction
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 40
    lambda: |-
      return {id(overdoor_counter).get_last_direction_text()};

  - platform: template
    name: ${friendly_name} Last Detection Time
