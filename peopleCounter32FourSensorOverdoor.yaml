substitutions:
  devicename: roode-four-sensor-overdoor
  friendly_name: Roode Four Sensor Overdoor

external_components:
  refresh: always
  source: components

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  reboot_timeout: 60min

ota:
  - platform: esphome
    password: !secret roode_ota_password

wifi:
  ssid: !secret roode_wifi_ssid
  password: !secret roode_wifi_password
  use_address: ${devicename}
  domain: .local
  power_save_mode: none
  ap:
    ssid: "Roode 4 Counter"
    password: !secret roode_fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: !secret roode_web_username
    password: !secret roode_web_password
  sorting_groups:
    - id: web_group_overview
      name: Overview
      sorting_weight: 10
    - id: web_group_controls
      name: Controls
      sorting_weight: 20
    - id: web_group_counting
      name: Counting
      sorting_weight: 30
    - id: web_group_rows
      name: Row Activity
      sorting_weight: 40
    - id: web_group_sensors
      name: Sensor Distances
      sorting_weight: 50
    - id: web_group_health
      name: Health
      sorting_weight: 60

tof_overdoor_ui:
  title: ${friendly_name}
  label: Front Door Counter
  counter_id: overdoor_counter

tof_overdoor_counter:
  id: overdoor_counter
  sda: 21
  scl: 22
  frequency: 100kHz
  timeout: 1500ms
  wake_delay: 60ms
  post_address_delay: 80ms
  init_retries: 3
  update_interval: 120ms
  base_address: 0x30
  trigger_delta: 350mm
  release_delta: 220mm
  sequence_timeout: 2s
  cooldown: 600ms
  invert_direction: false
  xshut_pins:
    - GPIO16
    - GPIO17
    - GPIO23
    - GPIO25

button:
  - platform: restart
    name: ${friendly_name} Restart
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 40

  - platform: template
    name: ${friendly_name} Rediscover Sensors
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 10
    on_press:
      - lambda: |-
          id(overdoor_counter).rediscover();

  - platform: template
    name: ${friendly_name} Recalibrate Floor Reference
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 20
    on_press:
      - lambda: |-
          id(overdoor_counter).recalibrate();

  - platform: template
    name: ${friendly_name} Reset Counts
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 30
    on_press:
      - lambda: |-
          id(overdoor_counter).reset_counts();

binary_sensor:
  - platform: status
    name: ${friendly_name} Device Status
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 10

  - platform: template
    name: ${friendly_name} Counter Ready
    lambda: |-
      return id(overdoor_counter).get_ready_state() > 0.5f;
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 20

  - platform: template
    name: ${friendly_name} Presence
    lambda: |-
      return id(overdoor_counter).get_presence_state() > 0.5f;
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 30

  - platform: template
    name: ${friendly_name} Row A Active
    lambda: |-
      return id(overdoor_counter).get_row_active_state(0) > 0.5f;
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 10

  - platform: template
    name: ${friendly_name} Row B Active
    lambda: |-
      return id(overdoor_counter).get_row_active_state(1) > 0.5f;
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 20

sensor:
  - platform: template
    name: ${friendly_name} Discovered Sensors
    unit_of_measurement: sensors
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 40
    lambda: |-
      return id(overdoor_counter).get_discovered_sensor_count();

  - platform: template
    name: ${friendly_name} Cycle Duration
    unit_of_measurement: ms
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_health
      sorting_weight: 10
    lambda: |-
      return id(overdoor_counter).get_cycle_duration_ms();

  - platform: template
    name: ${friendly_name} Update Skew
    unit_of_measurement: ms
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_health
      sorting_weight: 20
    lambda: |-
      return id(overdoor_counter).get_update_skew_ms();

  - platform: template
    name: ${friendly_name} People Count
    unit_of_measurement: persons
    accuracy_decimals: 0
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 10
    lambda: |-
      return id(overdoor_counter).get_people_count();

  - platform: template
    name: ${friendly_name} Entry Count
    unit_of_measurement: persons
    accuracy_decimals: 0
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 20
    lambda: |-
      return id(overdoor_counter).get_entry_count();

  - platform: template
    name: ${friendly_name} Exit Count
    unit_of_measurement: persons
    accuracy_decimals: 0
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 30
    lambda: |-
      return id(overdoor_counter).get_exit_count();

  - platform: template
    name: ${friendly_name} Row A Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 30
    lambda: |-
      return id(overdoor_counter).get_row_distance_mm(0);

  - platform: template
    name: ${friendly_name} Row A Baseline
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 40
    lambda: |-
      return id(overdoor_counter).get_row_baseline_mm(0);

  - platform: template
    name: ${friendly_name} Row A Drop
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 50
    lambda: |-
      return id(overdoor_counter).get_row_drop_mm(0);

  - platform: template
    name: ${friendly_name} Row B Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 60
    lambda: |-
      return id(overdoor_counter).get_row_distance_mm(1);

  - platform: template
    name: ${friendly_name} Row B Baseline
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 70
    lambda: |-
      return id(overdoor_counter).get_row_baseline_mm(1);

  - platform: template
    name: ${friendly_name} Row B Drop
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_rows
      sorting_weight: 80
    lambda: |-
      return id(overdoor_counter).get_row_drop_mm(1);

  - platform: template
    name: ${friendly_name} U3 Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 10
    lambda: |-
      return id(overdoor_counter).get_distance_mm(0);

  - platform: template
    name: ${friendly_name} U4 Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 20
    lambda: |-
      return id(overdoor_counter).get_distance_mm(1);

  - platform: template
    name: ${friendly_name} U7 Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 30
    lambda: |-
      return id(overdoor_counter).get_distance_mm(2);

  - platform: template
    name: ${friendly_name} U8 Distance
    unit_of_measurement: mm
    accuracy_decimals: 0
    update_interval: 200ms
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 40
    lambda: |-
      return id(overdoor_counter).get_distance_mm(3);

text_sensor:
  - platform: template
    name: ${friendly_name} Phase
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 50
    lambda: |-
      return {id(overdoor_counter).get_phase_text()};

  - platform: template
    name: ${friendly_name} Last Direction
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 40
    lambda: |-
      return {id(overdoor_counter).get_last_direction_text()};

  - platform: template
    name: ${friendly_name} Summary
    update_interval: 500ms
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 60
    lambda: |-
      return {id(overdoor_counter).get_summary()};

  - platform: template
    name: ${friendly_name} Discovery Map
    update_interval: 10s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_health
      sorting_weight: 30
    lambda: |-
      return {id(overdoor_counter).get_discovery_map()};

  - platform: template
    name: ${friendly_name} U3 Status
    update_interval: 500ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 60
    lambda: |-
      return {id(overdoor_counter).get_status_text(0)};

  - platform: template
    name: ${friendly_name} U4 Status
    update_interval: 500ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 70
    lambda: |-
      return {id(overdoor_counter).get_status_text(1)};

  - platform: template
    name: ${friendly_name} U7 Status
    update_interval: 500ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 80
    lambda: |-
      return {id(overdoor_counter).get_status_text(2)};

  - platform: template
    name: ${friendly_name} U8 Status
    update_interval: 500ms
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_sensors
      sorting_weight: 90
    lambda: |-
      return {id(overdoor_counter).get_status_text(3)};
