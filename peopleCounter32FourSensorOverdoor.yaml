substitutions:
  devicename: roode-four-sensor-overdoor
  friendly_name: Roode Four Sensor Overdoor

external_components:
  refresh: always
  source: components

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  reboot_timeout: 60min

ota:
  - platform: esphome
    password: !secret roode_ota_password

wifi:
  ssid: !secret roode_wifi_ssid
  password: !secret roode_wifi_password
  fast_connect: true
  use_address: 10.0.0.100
  manual_ip:
    static_ip: 10.0.0.100
    gateway: 10.0.0.1
    subnet: 255.255.255.0
  domain: .local
  power_save_mode: none
  ap:
    ssid: "Roode 4 Counter"
    password: !secret roode_fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: !secret roode_web_username
    password: !secret roode_web_password
  sorting_groups:
    - id: web_group_overview
      name: Overview
      sorting_weight: 10
    - id: web_group_controls
      name: Controls
      sorting_weight: 20
    - id: web_group_counting
      name: Counting
      sorting_weight: 30
    - id: web_group_rows
      name: Group Activity
      sorting_weight: 40
    - id: web_group_sensors
      name: Sensor Distances
      sorting_weight: 50
    - id: web_group_settings
      name: Settings
      sorting_weight: 55
    - id: web_group_health
      name: Health
      sorting_weight: 60

tof_overdoor_ui:
  title: ${friendly_name}
  label: Front Door Counter
  counter_id: overdoor_counter

tof_overdoor_counter:
  id: overdoor_counter
  sda: 21
  scl: 22
  frequency: 400kHz
  timeout: 1500ms
  wake_delay: 120ms
  post_address_delay: 150ms
  distance_mode: long
  timing_budget: 33ms
  intermeasurement_period: 33ms
  init_retries: 3
  sampling: 2
  update_interval: 10ms
  base_address: 0x30
  trigger_delta: 320mm
  release_delta: 180mm
  baseline_tolerance: 80mm
  debounce: 45ms
  sequence_timeout: 1600ms
  cooldown: 500ms
  blocked_timeout: 1800ms
  standing_timeout: 2200ms
  minimum_clear_distance: 600mm
  calibration_samples: 24
  min_valid_sensors: 3
  max_people_inside: 50
  auto_save_enabled: true
  invert_direction: false
  mode: count
  xshut_pins:
    - GPIO16
    - GPIO17
    - GPIO23
    - GPIO25

button:
  - platform: restart
    name: ${friendly_name} Restart
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 40

  - platform: template
    name: ${friendly_name} Rediscover Sensors
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 10
    on_press:
      - lambda: |-
          id(overdoor_counter).rediscover();

  - platform: template
    name: ${friendly_name} Recalibrate Floor Reference
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 20
    on_press:
      - lambda: |-
          id(overdoor_counter).recalibrate();

  - platform: template
    name: ${friendly_name} Reset Counts
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 30
    on_press:
      - lambda: |-
          id(overdoor_counter).reset_counts();

  - platform: template
    name: ${friendly_name} Reset Unsure IN
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 35
    on_press:
      - lambda: |-
          id(overdoor_counter).reset_unsure_in();

  - platform: template
    name: ${friendly_name} Reset Unsure OUT
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 36
    on_press:
      - lambda: |-
          id(overdoor_counter).reset_unsure_out();

  - platform: template
    name: ${friendly_name} Reset All Counters
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 37
    on_press:
      - lambda: |-
          id(overdoor_counter).reset_all_counters();

switch:
  - platform: template
    name: ${friendly_name} Invert Direction
    entity_category: config
    optimistic: true
    restore_mode: DISABLED
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 10
    lambda: |-
      return id(overdoor_counter).get_invert_direction();
    turn_on_action:
      - lambda: |-
          id(overdoor_counter).set_invert_direction(true);
          id(overdoor_counter).persist_runtime_state();
    turn_off_action:
      - lambda: |-
          id(overdoor_counter).set_invert_direction(false);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Auto Save Enabled
    entity_category: config
    optimistic: true
    restore_mode: DISABLED
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 20
    lambda: |-
      return id(overdoor_counter).get_auto_save_enabled();
    turn_on_action:
      - lambda: |-
          id(overdoor_counter).set_auto_save_enabled(true);
          id(overdoor_counter).persist_runtime_state();
    turn_off_action:
      - lambda: |-
          id(overdoor_counter).set_auto_save_enabled(false);
          id(overdoor_counter).persist_runtime_state();

number:
  - platform: template
    name: ${friendly_name} Trigger Threshold
    entity_category: config
    unit_of_measurement: mm
    mode: box
    min_value: 80
    max_value: 1200
    step: 10
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 30
    lambda: |-
      return id(overdoor_counter).get_trigger_threshold_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_trigger_delta_mm((uint16_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Clear Threshold
    entity_category: config
    unit_of_measurement: mm
    mode: box
    min_value: 40
    max_value: 900
    step: 10
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 40
    lambda: |-
      return id(overdoor_counter).get_clear_threshold_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_release_delta_mm((uint16_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Baseline Tolerance
    entity_category: config
    unit_of_measurement: mm
    mode: box
    min_value: 20
    max_value: 300
    step: 5
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 50
    lambda: |-
      return id(overdoor_counter).get_baseline_tolerance_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_baseline_tolerance_mm((uint16_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Debounce
    entity_category: config
    unit_of_measurement: ms
    mode: box
    min_value: 5
    max_value: 300
    step: 5
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 60
    lambda: |-
      return id(overdoor_counter).get_debounce_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_debounce_ms((uint32_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Detection Timeout
    entity_category: config
    unit_of_measurement: ms
    mode: box
    min_value: 300
    max_value: 4000
    step: 50
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 70
    lambda: |-
      return id(overdoor_counter).get_detection_timeout_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_sequence_timeout_ms((uint32_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Cooldown
    entity_category: config
    unit_of_measurement: ms
    mode: box
    min_value: 0
    max_value: 3000
    step: 50
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 80
    lambda: |-
      return id(overdoor_counter).get_cooldown_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_cooldown_ms((uint32_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Min Valid Sensors
    entity_category: config
    mode: box
    min_value: 2
    max_value: 4
    step: 1
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 90
    lambda: |-
      return id(overdoor_counter).get_min_valid_sensors_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_min_valid_sensors((uint8_t) x);
          id(overdoor_counter).persist_runtime_state();

  - platform: template
    name: ${friendly_name} Max People Inside
    entity_category: config
    mode: box
    min_value: 1
    max_value: 500
    step: 1
    update_interval: 2s
    web_server:
      sorting_group_id: web_group_settings
      sorting_weight: 100
    lambda: |-
      return id(overdoor_counter).get_max_people_inside_value();
    set_action:
      - lambda: |-
          id(overdoor_counter).set_max_people_inside((uint16_t) x);
          id(overdoor_counter).persist_runtime_state();

binary_sensor:
