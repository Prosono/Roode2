    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_counting
      sorting_weight: 45
    lambda: |-
      return {id(overdoor_counter).get_last_detection_timestamp_text()};

  - platform: template
    name: ${friendly_name} Last Decision Reason
