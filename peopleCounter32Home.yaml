substitutions:
  devicename: roode-home
  friendly_name: Roode Home
  component_repo_url: https://github.com/Prosono/Roode2.git
  component_repo_ref: main

external_components:
  - source:
      type: git
      url: ${component_repo_url}
      ref: ${component_repo_ref}
    refresh: always

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

ota:
  - platform: esphome
    password: !secret roode_ota_password

wifi:
  ssid: !secret roode_wifi_ssid
  password: !secret roode_wifi_password
  use_address: ${devicename}
  domain: .local
  power_save_mode: none
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret roode_fallback_ap_password

captive_portal:

web_server:
  port: 80
  auth:
    username: !secret roode_web_username
    password: !secret roode_web_password

vl53l1x:
  sda_pin: 21
  scl_pin: 22
  frequency: 100kHz
  calibration:
    ranging: auto

roode:
  id: roode_platform
  sampling: 2
  orientation: parallel
  roi: { height: 16, width: 6 }
  detection_thresholds:
    max: 85%
  zones:
    invert: true

button:
  - platform: restart
    name: ${friendly_name} Restart
    entity_category: config
  - platform: template
    name: ${friendly_name} Recalibrate
    entity_category: config
    on_press:
      - lambda: id(roode_platform)->recalibration();

number:
  - platform: roode
    people_counter:
      id: people_counter
      name: ${friendly_name} People Counter

binary_sensor:
  - platform: status
    name: ${friendly_name} Device Status
  - platform: roode
    presence_sensor:
      name: ${friendly_name} Presence

sensor:
  - platform: roode
    id: roode_sensors
    distance_entry:
      name: ${friendly_name} Distance Zone 0
      filters:
        - delta: 100
    distance_exit:
      name: ${friendly_name} Distance Zone 1
      filters:
        - delta: 100
    max_threshold_entry:
      name: ${friendly_name} Max Zone 0
    max_threshold_exit:
      name: ${friendly_name} Max Zone 1
    min_threshold_entry:
      name: ${friendly_name} Min Zone 0
    min_threshold_exit:
      name: ${friendly_name} Min Zone 1
    roi_height_entry:
      name: ${friendly_name} ROI Height Zone 0
    roi_width_entry:
      name: ${friendly_name} ROI Width Zone 0
    roi_height_exit:
      name: ${friendly_name} ROI Height Zone 1
    roi_width_exit:
      name: ${friendly_name} ROI Width Zone 1
    sensor_status:
      name: ${friendly_name} Sensor Status

text_sensor:
  - platform: wifi_info
    ip_address:
      name: ${friendly_name} IP Address
    ssid:
      name: ${friendly_name} WiFi SSID
  - platform: roode
    version:
      name: ${friendly_name} Version
  - platform: roode
    entry_exit_event:
      name: ${friendly_name} Last Direction
