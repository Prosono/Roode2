substitutions:
  devicename: roode-six-sensor-retry
  friendly_name: Roode Six Sensor Retry

external_components:
  refresh: always
  source: components

esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  reboot_timeout: 60min

ota:
  - platform: esphome
    password: !secret roode_ota_password

wifi:
  ssid: !secret roode_wifi_ssid
  password: !secret roode_wifi_password
  use_address: 10.0.0.100
  manual_ip:
    static_ip: 10.0.0.100
    gateway: 10.0.0.1
    subnet: 255.255.255.0
  domain: .local
  power_save_mode: none
  ap:
    ssid: "Roode 6 Retry"
    password: !secret roode_fallback_ap_password

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: !secret roode_web_username
    password: !secret roode_web_password
  sorting_groups:
    - id: web_group_overview
      name: Overview
      sorting_weight: 10
    - id: web_group_controls
      name: Controls
      sorting_weight: 20
    - id: web_group_live
      name: Live Distances
      sorting_weight: 30
    - id: web_group_timing
      name: Timing
      sorting_weight: 40
    - id: web_group_health
      name: Sensor Health
      sorting_weight: 50

tof_array_test:
  id: tof_board_test
  sda: 21
  scl: 22
  frequency: 100kHz
  timeout: 1500ms
  wake_delay: 80ms
  post_address_delay: 120ms
  distance_mode: long
  timing_budget: 33ms
  intermeasurement_period: 37ms
  init_retries: 4
  update_interval: 10ms
  base_address: 0x30
  roi:
    width: 16
    height: 16
    center: 199
  xshut_pins:
    - GPIO16
    - GPIO17
    - GPIO18
    - GPIO19
    - GPIO23
    - GPIO25

button:
  - platform: restart
    name: ${friendly_name} Restart
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 20

  - platform: template
    name: ${friendly_name} Rediscover Sensors
    entity_category: config
    web_server:
      sorting_group_id: web_group_controls
      sorting_weight: 10
    on_press:
      - lambda: |-
          id(tof_board_test).rediscover();

binary_sensor:
  - platform: status
    name: ${friendly_name} Device Status
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 10

sensor:
  - platform: template
    name: ${friendly_name} Discovered Sensors
    unit_of_measurement: sensors
    accuracy_decimals: 0
    update_interval: 2s
    entity_category: diagnostic
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 20
    lambda: |-
      return id(tof_board_test).get_discovered_sensor_count();

  - platform: template
    name: ${friendly_name} Cycle Duration
