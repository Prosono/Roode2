    ip_address:
      name: ${friendly_name} IP Address
      web_server:
        sorting_group_id: web_group_overview
        sorting_weight: 60
    ssid:
      name: ${friendly_name} WiFi SSID
      web_server:
        sorting_group_id: web_group_overview
        sorting_weight: 70

  - platform: template
    name: ${friendly_name} Bring-up Guide
    entity_category: diagnostic
    update_interval: never
    web_server:
      sorting_group_id: web_group_overview
      sorting_weight: 80
    lambda: |-
      return {"Expected XSHUT map: U3=GPIO16, U4=GPIO17, U5=GPIO18, U6=GPIO19, U7=GPIO23, U8=GPIO25."};

  - platform: template
    name: ${friendly_name} Discovery Map
